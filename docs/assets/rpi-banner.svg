<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" width="840" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="15%" stop-color="#3b82f6"/>
      <stop offset="85%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="nodeP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="nodePl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="300" rx="8" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="840" y2="80"/>
    <line x1="0" y1="160" x2="840" y2="160"/>
    <line x1="0" y1="240" x2="840" y2="240"/>
    <line x1="210" y1="0" x2="210" y2="300"/>
    <line x1="420" y1="0" x2="420" y2="300"/>
    <line x1="630" y1="0" x2="630" y2="300"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="200" cy="160" r="120" fill="#3b82f6" opacity="0.03" filter="url(#softGlow)"/>
  <circle cx="640" cy="160" r="120" fill="#8b5cf6" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Title -->
  <text x="420" y="58" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#f8fafc" letter-spacing="-2">rpi</text>
  <text x="420" y="84" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="4">RESEARCH · PROPOSE · PLAN · IMPLEMENT</text>

  <!-- Accent line -->
  <rect x="40" y="100" width="760" height="1" fill="url(#accentLine)" rx="0.5"/>

  <!-- Pipeline nodes — 4 boxes, each 160w x 72h, 30px gap -->
  <!-- Box positions: x=30, x=232, x=434, x=636  (gap between right edge and next left = 30 + 12 arrow) -->
  <!-- Centers: 110, 312, 514, 716 -->

  <!-- Connector lines: right edges at 190, 392, 594 → left edges at 232, 434, 636 -->
  <g stroke="#334155" stroke-width="2" stroke-dasharray="5,3" opacity="0.6">
    <line x1="190" y1="168" x2="224" y2="168"/>
    <line x1="392" y1="168" x2="426" y2="168"/>
    <line x1="594" y1="168" x2="628" y2="168"/>
  </g>
  <g fill="#334155" opacity="0.6">
    <polygon points="224,164 224,172 232,168"/>
    <polygon points="426,164 426,172 434,168"/>
    <polygon points="628,164 628,172 636,168"/>
  </g>

  <!-- Research -->
  <g>
    <rect x="30" y="132" width="160" height="72" rx="10" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="60" cy="157" r="9" fill="url(#nodeR)" opacity="0.9" filter="url(#glow)"/>
    <text x="75" y="162" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" font-weight="600" fill="#93c5fd">Research</text>
    <text x="110" y="186" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="11" fill="#64748b">Explore &amp; understand</text>
  </g>

  <!-- Propose -->
  <g>
    <rect x="232" y="132" width="160" height="72" rx="10" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="262" cy="157" r="9" fill="url(#nodeP)" opacity="0.9" filter="url(#glow)"/>
    <text x="277" y="162" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" font-weight="600" fill="#c4b5fd">Propose</text>
    <text x="312" y="186" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="11" fill="#64748b">Design with trade-offs</text>
  </g>

  <!-- Plan -->
  <g>
    <rect x="434" y="132" width="160" height="72" rx="10" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="464" cy="157" r="9" fill="url(#nodePl)" opacity="0.9" filter="url(#glow)"/>
    <text x="479" y="162" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" font-weight="600" fill="#fcd34d">Plan</text>
    <text x="514" y="186" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="11" fill="#64748b">Phased steps &amp; criteria</text>
  </g>

  <!-- Implement -->
  <g>
    <rect x="636" y="132" width="160" height="72" rx="10" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="666" cy="157" r="9" fill="url(#nodeI)" opacity="0.9" filter="url(#glow)"/>
    <text x="681" y="162" font-family="'SF Mono', 'Fira Code', monospace" font-size="15" font-weight="600" fill="#6ee7b7">Implement</text>
    <text x="716" y="186" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="11" fill="#64748b">Execute &amp; verify</text>
  </g>

  <!-- CLI badge -->
  <g>
    <rect x="295" y="224" width="250" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="420" y="245" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" fill="#94a3b8">$ rpi init your-project</text>
  </g>

  <!-- Tagline -->
  <text x="420" y="282" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="13" fill="#475569">Structured AI coding workflows — human in the loop at every stage</text>
</svg>